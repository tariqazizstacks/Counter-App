<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Counter-App</title>
    <style>
        
        
         
    body {
    display: flex;
    justify-content: center;
    align-items: center;  
    height: 100vh;   
    background: #5b635a;
    background-image: url("images/tasbbeeh.png");
    background-size: cover;
    background-position: center;
    }

    .box {
    height: 400px;
    width: 220px;
    display: flex;
    flex-direction: column;     
    align-items: center;
    justify-content: space-around;
    background-color: #473638;
    border: 3px solid red;
    border-radius: 12px;        
    /* box-shadow: 0 4px 10px rgba(120, 64, 64, 0.2); soft shadow */
     box-shadow: 6px 6px 12px rgba(0,0,0,0.3), -3px -3px 6px rgba(255,255,255,0.6);
    }

  h1{
    font-size: 100px;
    font-weight:bolder;
    background-color: whitesmoke;
    border: 3px red solid;
    border-radius: 20px;
    height: 150px;
    width: 90%;
    padding-top: 20px;
    text-align: center;
    font-weight: bold;
    color:black;
    margin-top: 0%;
    margin-bottom: 10px;
    /* margin-bottom: 10px; */
    text-shadow: 2px 2px 4px rgba(0,0,0,0.4);
    box-shadow: -1px -1px 10px rgba(218, 18, 18, 0.3);
    }

    .btn {
    width: 140px;
    padding: 10px;
    margin: 5px;
    border: none;
    border-radius: 8px;
    background: #007bff;       /* blue buttons */
    color: white;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
    box-shadow: 4px 4px 8px rgba(0,0,0,0.3), -2px -2px 4px rgba(255,255,255,0.5);
    }

    .btn:hover {
     background:rgb(238, 63, 119);       /* darker blue on hover */
    }

    #reset {
    background: #dc3545;  
    border-radius: 50px; 
    width: 60px;           
    height: 60px;
    border-radius: 50%;     
    background: #dc3545;      
    color: white;
    border: none;
    font-size: 16px; 
    box-shadow: 4px 4px 8px rgba(0,0,0,0.3), -2px -2px 4px rgba(255,255,255,0.5);     
    }

    #reset:hover {
     background: #a71d2a;
    }


    </style>

</head>
<body>
    <div class="box">
        <h1 id="number">0</h1>
        <button class="btn " id="count">Counter</button>
        <button class="btn" id="dec">Decrese</button>
        <button class="btn" id="reset">Reset</button>
    </div>

</body>
<script>
    let number= document.querySelector("h1");
    let count= document.getElementById("count");
    let decrease= document.getElementById("dec");
    let reset= document.getElementById("reset");
    let cont=0;
    count.addEventListener("click",()=>{
        cont++;
        number.innerText=cont;
    });

    decrease.addEventListener("click",()=>{
        cont--;
        number.innerText=cont;
    });
    reset.addEventListener("click",()=>{
        cont=0;
        number.innerText=cont;
    });
    
    

</script>
</html>
